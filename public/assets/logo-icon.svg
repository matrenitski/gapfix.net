<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GapFix icon">
  <title>GapFix</title>

  <!-- Bitcoin-orange rounded square — stands out on any dark background -->
  <rect width="100" height="100" rx="20" fill="#f7931a"/>

  <!-- Subtle inner shadow for depth -->
  <rect width="100" height="100" rx="20" fill="url(#vignette)" opacity="0.18"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Left address slot (dim — normal chain member) -->
  <rect x="10" y="38" width="22" height="24" rx="4" fill="rgba(0,0,0,0.30)"/>

  <!-- Connector dots -->
  <circle cx="36.5" cy="50" r="2.2" fill="rgba(0,0,0,0.28)"/>
  <circle cx="63.5" cy="50" r="2.2" fill="rgba(0,0,0,0.28)"/>

  <!-- Center block — the identified gap, enlarged for emphasis -->
  <rect x="40" y="29" width="20" height="42" rx="5" fill="rgba(0,0,0,0.72)"/>
  <!-- Highlight stripe at top of center block -->
  <rect x="40" y="29" width="20" height="10" rx="5" fill="rgba(255,255,255,0.10)"/>
  <!-- White checkmark: gap found & fixed -->
  <polyline
    points="46,50 49.5,55 56,43"
    stroke="white"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Right address slot (dim — normal chain member) -->
  <rect x="68" y="38" width="22" height="24" rx="4" fill="rgba(0,0,0,0.30)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="centerglow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f7931a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f7931a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0d0d0d"/>

  <!-- Subtle center glow -->
  <ellipse cx="640" cy="320" rx="600" ry="320" fill="url(#centerglow)"/>

  <!-- Orange accent bar top -->
  <rect x="0" y="0" width="1280" height="4" fill="#f7931a"/>

  <!-- Subtle grid -->
  <line x1="0" y1="320" x2="1280" y2="320" stroke="#131313" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="640" stroke="#131313" stroke-width="1"/>

  <!-- ── Large logo icon (108×108) centered ── -->
  <!-- Positioned at x=586, y=100 to center at 640 -->
  <rect x="586" y="98" width="108" height="108" rx="21.6" fill="#f7931a"/>
  <rect x="586" y="98" width="108" height="108" rx="21.6" fill="url(#vignette)" opacity="0.18"/>
  <!-- Left slot -->
  <rect x="596.8" y="139.1" width="23.7" height="25.95" rx="4.35" fill="rgba(0,0,0,0.30)"/>
  <!-- Connector dots -->
  <circle cx="625.5" cy="152" r="2.4" fill="rgba(0,0,0,0.28)"/>
  <circle cx="654.5" cy="152" r="2.4" fill="rgba(0,0,0,0.28)"/>
  <!-- Center block -->
  <rect x="628.2" y="129.35" width="21.6" height="45.3" rx="5.4" fill="rgba(0,0,0,0.72)"/>
  <rect x="628.2" y="129.35" width="21.6" height="10.8" rx="5.4" fill="rgba(255,255,255,0.10)"/>
  <!-- Checkmark -->
  <polyline points="634.65,152 638.4,157.4 645.45,144.44" stroke="white" stroke-width="3.45" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right slot -->
  <rect x="659.5" y="139.1" width="23.7" height="25.95" rx="4.35" fill="rgba(0,0,0,0.30)"/>

  <!-- Wordmark large centered -->
  <!-- "Gap" + "Fix" centered -->
  <text x="580" y="268" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="800" font-size="80" fill="#e8e8e8" letter-spacing="-2.5" text-anchor="end">Gap</text>
  <text x="592" y="268" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="800" font-size="80" fill="#f7931a" letter-spacing="-2.5">Fix</text>

  <!-- Divider dot between wordmark lines -->
  <line x1="200" y1="296" x2="1080" y2="296" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Tagline -->
  <text x="640" y="356" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="28" fill="#888888" text-anchor="middle">Bitcoin address gap fixer</text>

  <!-- Feature pills row -->
  <rect x="193" y="390" width="230" height="48" rx="24" fill="#131313" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="308" y="420" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="600" font-size="18" fill="#e8e8e8" text-anchor="middle">Free &amp; open-source</text>

  <rect x="445" y="390" width="185" height="48" rx="24" fill="#131313" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="537" y="420" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="600" font-size="18" fill="#e8e8e8" text-anchor="middle">Client-side</text>

  <rect x="652" y="390" width="195" height="48" rx="24" fill="#131313" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="749" y="420" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="600" font-size="18" fill="#e8e8e8" text-anchor="middle">xpub / zpub</text>

  <rect x="869" y="390" width="218" height="48" rx="24" fill="#131313" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="978" y="420" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="600" font-size="18" fill="#e8e8e8" text-anchor="middle">No server, no keys</text>

  <!-- URL -->
  <text x="640" y="516" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="26" fill="#f7931a" text-anchor="middle">gapfix.net</text>

  <!-- Decorative corner marks -->
  <rect x="30" y="30" width="20" height="3" fill="#2a2a2a"/>
  <rect x="30" y="30" width="3" height="20" fill="#2a2a2a"/>
  <rect x="1230" y="30" width="20" height="3" fill="#2a2a2a"/>
  <rect x="1247" y="30" width="3" height="20" fill="#2a2a2a"/>
  <rect x="30" y="607" width="20" height="3" fill="#2a2a2a"/>
  <rect x="30" y="590" width="3" height="20" fill="#2a2a2a"/>
  <rect x="1230" y="607" width="20" height="3" fill="#2a2a2a"/>
  <rect x="1247" y="590" width="3" height="20" fill="#2a2a2a"/>

  <!-- Bottom bar -->
  <rect x="0" y="636" width="1280" height="4" fill="#1f1f1f"/>
</svg>

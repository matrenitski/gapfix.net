<svg viewBox="0 0 300 72" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GapFix logo (light background)">
  <title>GapFix – Bitcoin HD Wallet Gap Scanner</title>
  <defs>
    <radialGradient id="vignette2" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="black" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- ── Icon mark (same orange bg — works on light too) ── -->
  <rect x="0" y="0" width="72" height="72" rx="14.4" fill="#f7931a"/>
  <rect x="0" y="0" width="72" height="72" rx="14.4" fill="url(#vignette2)" opacity="0.14"/>

  <!-- Left slot -->
  <rect x="7.2" y="27.4" width="15.8" height="17.3" rx="2.9" fill="rgba(0,0,0,0.28)"/>
  <circle cx="26.3" cy="36" r="1.6" fill="rgba(0,0,0,0.25)"/>
  <circle cx="45.7" cy="36" r="1.6" fill="rgba(0,0,0,0.25)"/>
  <!-- Center block -->
  <rect x="28.8" y="20.9" width="14.4" height="30.2" rx="3.6" fill="rgba(0,0,0,0.70)"/>
  <rect x="28.8" y="20.9" width="14.4" height="7.2" rx="3.6" fill="rgba(255,255,255,0.12)"/>
  <polyline points="33.1,36 35.6,39.6 40.3,30.96" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right slot -->
  <rect x="49" y="27.4" width="15.8" height="17.3" rx="2.9" fill="rgba(0,0,0,0.28)"/>

  <!-- ── Wordmark (dark text for light backgrounds) ── -->
  <text
    x="86"
    y="36"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="28"
    fill="#111111"
    letter-spacing="-0.5"
    dominant-baseline="middle"
  >Gap</text>
  <text
    x="149"
    y="36"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="28"
    fill="#f7931a"
    letter-spacing="-0.5"
    dominant-baseline="middle"
  >Fix</text>
</svg>
